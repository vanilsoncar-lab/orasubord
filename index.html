function DestaqueFrase({frase,destaque,cor}){
  if(!destaque||!frase.includes(destaque)) return React.createElement("span",null,frase);
  const parts=frase.split(destaque);
  return React.createElement("span",null,
    parts[0],
    React.createElement("span",{style:{background:cor||"#1B2A4A",color:"white",borderRadius:5,padding:"1px 5px",fontWeight:700,fontStyle:"normal"}},destaque),
    parts[1]||"");
}

// ── LOGIN / CADASTRO ──────────────────────────────────────────────────
function TelaLogin(){
  const [modo,setModo]     = useState("login");
  const [nome,setNome]     = useState("");
  const [sobrenome,setSobrenome] = useState("");
  const [turma,setTurma]   = useState("");
  const [email,setEmail]   = useState("");
  const [senha,setSenha]   = useState("");
  const [erro,setErro]     = useState("");
  const [ok,setOk]         = useState("");
  const [loading,setLoading] = useState(false);

  async function entrar(){
    if(!email||!senha){setErro("Preencha email e senha.");return;}
    setErro("");setLoading(true);
    const {error} = await sb.auth.signInWithPassword({email,password:senha});
    if(error) setErro("Email ou senha incorretos.");
    setLoading(false);
  }

  async function cadastrar(){
    if(!nome.trim()){setErro("Digite seu nome.");return;}
    if(!sobrenome.trim()){setErro("Digite seu sobrenome.");return;}
    if(!turma){setErro("Selecione sua turma.");return;}
    if(!email){setErro("Digite seu email.");return;}
    if(senha.length<6){setErro("A senha precisa ter pelo menos 6 caracteres.");return;}
    setErro("");setLoading(true);
    const {data,error} = await sb.auth.signUp({
      email, password:senha,
      options:{data:{nome:nome.trim(),sobrenome:sobrenome.trim()}}
    });
    if(error){
      console.error("Supabase signUp error:", JSON.stringify(error));
      setErro("Erro: "+(error.message||error.msg||error.error_description||JSON.stringify(error)));
      setLoading(false);return;
    }
    if(data.user){
      const {error:perfilError} = await sb.from("perfis").update({nome:nome.trim(),sobrenome:sobrenome.trim(),turma}).eq("id",data.user.id);
      if(perfilError) console.error("Perfil error:", JSON.stringify(perfilError));
    }
    setLoading(false);
    setOk("Conta criada! Entrando…");
  }

  return (
    <div style={{minHeight:"100vh",background:"linear-gradient(135deg,#1B2A4A,#2E4A7A)",display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
      <div style={{background:"white",borderRadius:20,padding:"32px 28px",width:"100%",maxWidth:380,boxShadow:"0 20px 60px rgba(0,0,0,0.3)"}}>
        <div style={{textAlign:"center",marginBottom:22}}>
          <img src={LOGO} alt="Logo" style={{width:60,height:60,objectFit:"contain",borderRadius:8,marginBottom:10}}/>
          <div style={{fontSize:11,color:"#888",letterSpacing:1,textTransform:"uppercase",marginBottom:3}}>E. M. F. Soares de Barros</div>
          <div style={{fontSize:16,fontWeight:800,color:"#1B2A4A"}}>Orações Subordinadas</div>
          <div style={{fontSize:12,color:"#888",marginTop:2}}>9º Ano · Língua Portuguesa</div>
        </div>

        <div style={{display:"flex",marginBottom:18,background:"#F5F6FA",borderRadius:10,padding:4}}>
          {[["login","Entrar"],["cadastro","Criar conta"]].map(([m,l])=>(
            <button key={m} onClick={()=>{setModo(m);setErro("");setOk("");}} style={{flex:1,padding:"8px 0",borderRadius:8,border:"none",fontWeight:700,fontSize:13,cursor:"pointer",background:modo===m?"white":"transparent",color:modo===m?"#1B2A4A":"#888",boxShadow:modo===m?"0 1px 4px rgba(0,0,0,0.1)":"none"}}>{l}</button>
          ))}
        </div>

        {modo==="cadastro" && (
          <>
            <input value={nome} onChange={e=>{setNome(e.target.value);setErro("");}} placeholder="Nome" style={inputStyle}/>
            <input value={sobrenome} onChange={e=>{setSobrenome(e.target.value);setErro("");}} placeholder="Sobrenome" style={inputStyle}/>
            <select value={turma} onChange={e=>{setTurma(e.target.value);setErro("");}} style={{...inputStyle,color:turma?"#222":"#aaa"}}>
              <option value="">Selecione sua turma</option>
              <optgroup label="8º Ano">
                <option value="81">8º Ano — Turma 81</option>
                <option value="82">8º Ano — Turma 82</option>
                <option value="83">8º Ano — Turma 83</option>
              </optgroup>
              <optgroup label="9º Ano">
                <option value="91">9º Ano — Turma 91</option>
                <option value="92">9º Ano — Turma 92</option>
                <option value="93">9º Ano — Turma 93</option>
              </optgroup>
            </select>
          </>
        )}

        <input value={email} onChange={e=>{setEmail(e.target.value);setErro("");}} placeholder="Email" type="email" style={inputStyle}/>
        <input value={senha} onChange={e=>{setSenha(e.target.value);setErro("");}} placeholder="Senha (mín. 6 caracteres)" type="password" style={{...inputStyle,marginBottom:14}}/>

        {erro && <div style={{fontSize:13,color:"#C0392B",marginBottom:10,textAlign:"center",lineHeight:1.5}}>{erro}</div>}
        {ok   && <div style={{fontSize:13,color:"#27AE60",marginBottom:10,textAlign:"center"}}>{ok}</div>}

        <button onClick={modo==="login"?entrar:cadastrar} disabled={loading} style={{...btnStyle,background:"#1B2A4A",color:"white",opacity:loading?0.7:1}}>
          {loading?"Aguarde…":(modo==="login"?"Entrar":"Criar conta")}
        </button>

        <p style={{fontSize:12,color:"#AAA",textAlign:"center",marginTop:4}}>
          {modo==="login"
            ? <>Não tem conta? <span onClick={()=>{setModo("cadastro");setErro("");}} style={{color:"#4A90D9",cursor:"pointer",fontWeight:600}}>Criar conta</span></>
            : <>Já tem conta? <span onClick={()=>{setModo("login");setErro("");}} style={{color:"#4A90D9",cursor:"pointer",fontWeight:600}}>Entrar</span></>
          }
        </p>
      </div>
    </div>
  );
}

      .select("*, perfis(nome,sobrenome,turma,email)")
      .order("criado_em",{ascending:false});
    const agg = {};
    TURMAS.forEach(t=>agg[t]={tentativas:[],alunos:new Set()});
    (data||[]).forEach(t=>{
      const tr=t.perfis?.turma;
      if(tr&&agg[tr]){agg[tr].tentativas.push(t);agg[tr].alunos.add(t.aluno_id);}
    });
    TURMAS.forEach(t=>{
      const tens=agg[t].tentativas;
      agg[t].media=tens.length?Math.round(tens.reduce((s,x)=>s+(x.acertos/x.total*100),0)/tens.length):0;
      agg[t].totalAlunos=agg[t].alunos.size;
    });
    setDados(agg);
    setLoading(false);
  }

  const turmasFiltradas = turmaSel==="todas"?TURMAS:[turmaSel];
  const anoLabel = t => (parseInt(t)<90?"8":"9")+"º Ano — Turma "+t;
  const corMedia = m => m>=70?"#27AE60":m>=50?"#E07B39":"#C0392B";

  return (
    <div style={{fontFamily:"'Segoe UI',sans-serif",minHeight:"100vh",background:"#F5F6FA"}}>
      <div style={{background:"linear-gradient(135deg,#1B2A4A,#2E4A7A)",color:"white",padding:"16px 20px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <div>
          <div style={{fontSize:10,opacity:0.6,letterSpacing:2,textTransform:"uppercase"}}>Painel do Professor</div>
          <div style={{fontSize:18,fontWeight:800}}>Orações Subordinadas Substantivas</div>
        </div>
        <div style={{display:"flex",gap:8}}>
          <button onClick={carregar} style={{background:"rgba(255,255,255,0.15)",border:"none",color:"white",padding:"7px 12px",borderRadius:8,cursor:"pointer",fontSize:13}}>↻</button>
          <button onClick={onSair} style={{background:"rgba(255,255,255,0.15)",border:"none",color:"white",padding:"7px 14px",borderRadius:8,cursor:"pointer",fontSize:13,fontWeight:600}}>Sair</button>
        </div>
      </div>

      <div style={{maxWidth:960,margin:"0 auto",padding:"20px 14px"}}>
        {/* Filtros */}
        <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:20,alignItems:"center"}}>
          <span style={{fontSize:12,color:"#888",marginRight:4}}>Filtrar:</span>
          <button onClick={()=>setTurmaSel("todas")} style={{padding:"5px 14px",borderRadius:20,border:"none",background:turmaSel==="todas"?"#1B2A4A":"white",color:turmaSel==="todas"?"white":"#555",cursor:"pointer",fontWeight:600,fontSize:12,boxShadow:"0 1px 4px rgba(0,0,0,0.08)"}}>Todas</button>
          {TURMAS.map(t=>(
            <button key={t} onClick={()=>setTurmaSel(t)} style={{padding:"5px 14px",borderRadius:20,border:"none",background:turmaSel===t?"#1B2A4A":"white",color:turmaSel===t?"white":"#555",cursor:"pointer",fontWeight:600,fontSize:12,boxShadow:"0 1px 4px rgba(0,0,0,0.08)"}}>
              {anoLabel(t)}
            </button>
          ))}
        </div>

        {loading
          ? <div style={{textAlign:"center",padding:48,color:"#888"}}>Carregando…</div>
          : <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(280px,1fr))",gap:16}}>
              {turmasFiltradas.map(t=>{
                const d=dados[t]||{tentativas:[],totalAlunos:0,media:0};
                const cor=corMedia(d.media);
                return (
                  <div key={t} style={{background:"white",borderRadius:14,padding:20,boxShadow:"0 2px 12px rgba(0,0,0,0.06)"}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
                      <div>
                        <div style={{fontSize:10,color:"#888",textTransform:"uppercase",letterSpacing:1}}>{parseInt(t)<90?"8º":"9º"} Ano</div>
                        <div style={{fontSize:22,fontWeight:800,color:"#1B2A4A"}}>Turma {t}</div>
                      </div>
                      <div style={{width:54,height:54,borderRadius:"50%",background:cor+"18",display:"flex",alignItems:"center",justifyContent:"center",border:"2px solid "+cor}}>
                        <span style={{fontSize:13,fontWeight:800,color:cor}}>{d.media}%</span>
                      </div>
                    </div>

                    <div style={{display:"flex",gap:10,marginBottom:14}}>
                      <div style={{flex:1,background:"#F5F6FA",borderRadius:8,padding:"10px 0",textAlign:"center"}}>
                        <div style={{fontSize:22,fontWeight:800,color:"#1B2A4A"}}>{d.totalAlunos}</div>
                        <div style={{fontSize:11,color:"#888"}}>alunos</div>
                      </div>
                      <div style={{flex:1,background:"#F5F6FA",borderRadius:8,padding:"10px 0",textAlign:"center"}}>
                        <div style={{fontSize:22,fontWeight:800,color:"#1B2A4A"}}>{d.tentativas.length}</div>
                        <div style={{fontSize:11,color:"#888"}}>tentativas</div>
                      </div>
                    </div>

                    <div style={{height:7,background:"#F0F0F0",borderRadius:10,overflow:"hidden",marginBottom:4}}>
                      <div style={{height:"100%",width:d.media+"%",background:cor,borderRadius:10,transition:"width 0.6s"}}/>
                    </div>
                    <div style={{fontSize:11,color:"#888",textAlign:"right",marginBottom:14}}>média de acertos</div>

                    {d.tentativas.length>0 && (
                      <div style={{borderTop:"1px solid #F0F0F0",paddingTop:12}}>
                        <div style={{fontSize:11,fontWeight:700,color:"#1B2A4A",marginBottom:8}}>Últimas tentativas</div>
                        {d.tentativas.slice(0,5).map((tent,i)=>{
                          const pct=Math.round(tent.acertos/tent.total*100);
                          const nome=(tent.perfis?.nome||"")+" "+(tent.perfis?.sobrenome||"");
                          return(
                            <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"5px 0",borderBottom:i<4&&i<d.tentativas.length-1?"1px solid #F5F6FA":"none"}}>
                              <span style={{fontSize:12,color:"#444",flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{nome.trim()||"Aluno"}</span>
                              <div style={{display:"flex",gap:8,alignItems:"center",flexShrink:0,marginLeft:8}}>
                                <span style={{fontSize:11,color:"#888"}}>{fmtTime(tent.tempo_segundos||0)}</span>
                                <span style={{fontSize:12,fontWeight:700,color:corMedia(pct)}}>{tent.acertos}/{tent.total}</span>
                              </div>
                            </div>
                          );
                        })}
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
        }
      </div>
    </div>
  );
}

// ── ODA ───────────────────────────────────────────────────────────────
function ODA({user,perfil,onSair}){
  const [tela,setTela]         = useState("intro");
  const [tipoIdx,setTipoIdx]   = useState(0);
  const [dica,setDica]         = useState(false);
  const [respostas,setRespostas] = useState({});
  const [qIdx,setQIdx]         = useState(0);
  const [confirmada,setConfirmada] = useState(false);
  const [opcao,setOpcao]       = useState(null);
  const [historico,setHistorico] = useState([]);
  const [menuAberto,setMenuAberto] = useState(null);
  const [tempo,setTempo]       = useState(0);
  const [rodando,setRodando]   = useState(false);
  const timerRef = useRef(null);
  const inicioRef= useRef(null);
  const [frase,setFrase]       = useState("");
  const [labEtapa,setLabEtapa] = useState(0);
  const [labResult,setLabResult] = useState(null);
  const [labErro,setLabErro]   = useState("");

  useEffect(()=>{ carregarHist(); },[]);

  async function carregarHist(){
    const {data} = await sb.from("tentativas").select("*")
      .eq("aluno_id",user.id).order("criado_em",{ascending:false}).limit(10);
    if(data) setHistorico(data);
  }

  useEffect(()=>{
    if(rodando){
      inicioRef.current=Date.now()-tempo*1000;
      timerRef.current=setInterval(()=>setTempo(Math.floor((Date.now()-inicioRef.current)/1000)),1000);
    } else clearInterval(timerRef.current);
    return ()=>clearInterval(timerRef.current);
  },[rodando]);

  function iniciarEx(){
    setQIdx(0);setRespostas({});setConfirmada(false);setOpcao(null);
    setTempo(0);setRodando(true);setTela("exercicios");
  }

  function confirmar(){
    if(!opcao) return;
    setRespostas(p=>({...p,[qIdx]:opcao}));
    setConfirmada(true);
  }

  async function proxQuestao(){
    if(qIdx<questoes.length-1){
      setQIdx(q=>q+1);setConfirmada(false);setOpcao(null);
    } else {
      setRodando(false);
      const rs={...respostas,[qIdx]:opcao};
      const ac=Object.entries(rs).filter(([i,r])=>r===questoes[parseInt(i)].resposta).length;
      const gab=questoes.map((q,i)=>({id:q.id,acertou:rs[i]===q.resposta,resposta:q.resposta,respondeu:rs[i]||null}));
      const {data} = await sb.from("tentativas").insert({
        aluno_id:user.id,turma:perfil.turma,
        acertos:ac,total:questoes.length,tempo_segundos:tempo,gabarito:gab
      }).select();
      if(data) setHistorico(h=>[data[0],...h].slice(0,10));
      setTela("resultado");
    }
  }

  async function analisarFrase(){
    if(frase.trim().length<8){setLabErro("Escreva uma frase um pouco maior.");return;}
    setLabErro("");setLabEtapa(1);setLabResult(null);
    const prompt=`Você é um assistente pedagógico de Língua Portuguesa para alunos do 9º ano.
O aluno escreveu esta frase: "${frase.trim()}"
Analise e responda APENAS em JSON válido, sem markdown, com este formato:
{"temSubordinada":true,"tipo":"subjetiva|objetiva-direta|objetiva-indireta|completiva-nominal|predicativa|apositiva|nenhuma","oracaoPrincipal":"","oracaoSubordinada":"","funcaoSintatica":"","avaliacaoBreve":"1-2 frases simples e acessíveis","sugestao":"1 frase de sugestão ou elogio","exemploReal":"1 frase de telejornal ou editorial","genero":"telejornal|editorial|discurso|notícia|anúncio"}`;
    try{
      const res=await fetch(WORKER,{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:800,messages:[{role:"user",content:prompt}]})
      });
      const data=await res.json();
      const txt=(data.content||[]).map(c=>c.text||"").join("").trim();
      const parsed=JSON.parse(txt.replace(/```json|```/g,"").trim());
      setLabResult(parsed);setLabEtapa(2);
      await sb.from("analises_lab").insert({aluno_id:user.id,turma:perfil.turma,frase_aluno:frase.trim(),resultado:parsed});
    }catch(e){
      setLabErro("Não foi possível analisar. Tente novamente.");
      setLabEtapa(0);
    }
  }

  function novoPercurso(){
    setTela("intro");setTipoIdx(0);setDica(false);
    setRespostas({});setQIdx(0);setConfirmada(false);setOpcao(null);
    setTempo(0);setRodando(false);setMenuAberto(null);
    setFrase("");setLabEtapa(0);setLabResult(null);setLabErro("");
  }

  const tipo=tipos[tipoIdx];
  const questao=questoes[qIdx];
  const acertosFinais=Object.entries(respostas).filter(([i,r])=>r===questoes[parseInt(i)].resposta).length;
  const msg=acertosFinais===6?{e:"🏆",t:"Perfeito! Você dominou tudo."}
           :acertosFinais>=4?{e:"👏",t:"Muito bem! Quase lá."}
           :acertosFinais>=2?{e:"📚",t:"Continue praticando."}
           :{e:"💪",t:"Volte ao conteúdo e tente de novo."};
  const S={card:{background:"white",borderRadius:16,padding:"22px 20px",boxShadow:"0 2px 12px rgba(0,0,0,0.06)",marginBottom:14}};

  const nomeCompleto=(perfil?.nome||"")+" "+(perfil?.sobrenome||"");

  function Grafico(){
    if(historico.length<2) return null;
    const exibir=[...historico].reverse().slice(-6);
    return(
      <div style={{marginTop:20,background:"#F5F6FA",borderRadius:12,padding:16}}>
        <div style={{fontWeight:700,color:"#1B2A4A",fontSize:13,marginBottom:12}}>📈 Sua evolução</div>
        <div style={{display:"flex",alignItems:"flex-end",gap:10,height:80}}>
          {exibir.map((h,i)=>{
            const pct=(h.acertos/h.total)*100;
            const bh=Math.max((pct/100)*60,6);
            const cor=pct>=80?"#27AE60":pct>=50?"#E07B39":"#C0392B";
            return(<div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
              <div style={{fontSize:10,color:"#555",fontWeight:700}}>{h.acertos}/{h.total}</div>
              <div style={{width:"100%",background:cor,borderRadius:"3px 3px 0 0",height:bh}}/>
              <div style={{fontSize:9,color:"#888"}}>T{i+1}</div>
            </div>);
          })}
        </div>
        <div style={{fontSize:10,color:"#aaa",marginTop:6,textAlign:"center"}}>T1 = mais antigo</div>
      </div>
    );
  }

  function MenuModal(){
    return(
      <div onClick={()=>setMenuAberto(null)} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",zIndex:100,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
        <div onClick={e=>e.stopPropagation()} style={{background:"white",borderRadius:16,padding:22,width:"100%",maxWidth:440,maxHeight:"80vh",overflowY:"auto",boxShadow:"0 8px 40px rgba(0,0,0,0.18)"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
            <span style={{fontSize:15,fontWeight:800,color:"#1B2A4A"}}>{menuAberto==="historico"?"📋 Meu Histórico":"🔄 Novo percurso"}</span>
            <button onClick={()=>setMenuAberto(null)} style={{background:"none",border:"none",fontSize:20,cursor:"pointer",color:"#888"}}>✕</button>
          </div>
          {menuAberto==="historico"&&(
            historico.length===0
              ?<p style={{color:"#888",textAlign:"center",padding:24,fontSize:14}}>Nenhuma tentativa ainda.</p>
              :<div>
                {historico.map((h,i)=>(
                  <div key={i} style={{background:"#F5F6FA",borderRadius:10,padding:14,marginBottom:10}}>
                    <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
                      <span style={{fontWeight:700,color:"#1B2A4A",fontSize:13}}>Tentativa {historico.length-i}</span>
                      <span style={{fontSize:11,color:"#888"}}>{new Date(h.criado_em).toLocaleDateString("pt-BR")}</span>
                    </div>
                    <div style={{display:"flex",gap:12}}>
                      <span style={{fontSize:13,color:h.acertos>=5?"#27AE60":h.acertos>=3?"#E07B39":"#C0392B",fontWeight:700}}>✓ {h.acertos}/{h.total} ({Math.round(h.acertos/h.total*100)}%)</span>
                      <span style={{fontSize:13,color:"#555"}}>⏱ {fmtTime(h.tempo_segundos||0)}</span>
                    </div>
                  </div>
                ))}
                <Grafico/>
              </div>
          )}
          {menuAberto==="novo"&&(
            <div style={{textAlign:"center"}}>
              <div style={{fontSize:36,marginBottom:10}}>🔄</div>
              <p style={{color:"#444",marginBottom:20,lineHeight:1.6,fontSize:14}}>Seu histórico será preservado.<br/>Você começa do zero.</p>
              <div style={{display:"flex",gap:10}}>
                <button onClick={()=>setMenuAberto(null)} style={{flex:1,padding:11,borderRadius:10,border:"1px solid #DDD",background:"white",cursor:"pointer",fontWeight:600,fontSize:13}}>Cancelar</button>
                <button onClick={novoPercurso} style={{flex:1,padding:11,borderRadius:10,border:"none",background:"#1B2A4A",color:"white",cursor:"pointer",fontWeight:700,fontSize:13}}>Começar novo</button>
              </div>
            </div>
          )}
        </div>
      </div>
    );
  }

  return(
    <div style={{fontFamily:"'Segoe UI',sans-serif",minHeight:"100vh",background:"#F5F6FA"}}>
      {menuAberto&&<MenuModal/>}
      <div style={{background:"linear-gradient(135deg,#1B2A4A,#2E4A7A)",color:"white",boxShadow:"0 2px 12px rgba(0,0,0,0.2)"}}>
        <div style={{display:"flex",alignItems:"center",gap:10,padding:"10px 18px",borderBottom:"1px solid rgba(255,255,255,0.1)"}}>
          <img src={LOGO} alt="Logo" style={{width:40,height:40,objectFit:"contain",borderRadius:6,background:"white",padding:2,flexShrink:0}}/>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontSize:10,fontWeight:700,color:"rgba(255,255,255,0.9)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>E. M. F. SOARES DE BARROS — CÍVICO MILITAR</div>
            <div style={{fontSize:9,color:"rgba(255,255,255,0.55)"}}>Prof.ª Kaira · Turma 92 &nbsp;|&nbsp; Prof.ª Jornada · Turma 93</div>
          </div>
          <div style={{display:"flex",gap:6,alignItems:"center",flexShrink:0}}>
            {rodando&&<div style={{background:"rgba(255,255,255,0.12)",borderRadius:20,padding:"3px 10px",fontSize:11,fontWeight:700,color:"#7FFFD4"}}>⏱ {fmtTime(tempo)}</div>}
            <button onClick={()=>setMenuAberto("historico")} title="Histórico" style={{background:"rgba(255,255,255,0.12)",border:"none",borderRadius:7,color:"white",cursor:"pointer",padding:"5px 9px",fontSize:15}}>📋</button>
            <button onClick={()=>setMenuAberto("novo")} title="Novo percurso" style={{background:"rgba(255,255,255,0.12)",border:"none",borderRadius:7,color:"white",cursor:"pointer",padding:"5px 9px",fontSize:15}}>🔄</button>
            <button onClick={onSair} style={{background:"rgba(255,255,255,0.12)",border:"none",borderRadius:7,color:"white",cursor:"pointer",padding:"5px 9px",fontSize:13,fontWeight:600}}>Sair</button>
          </div>
        </div>
        <div style={{padding:"12px 18px"}}>
          <div style={{fontSize:9,letterSpacing:2,textTransform:"uppercase",opacity:0.55,marginBottom:2}}>
            9º Ano · Língua Portuguesa · v1.3 · Turma {perfil?.turma||""}
            {nomeCompleto.trim()&&" · "+nomeCompleto.trim()}
          </div>
          <div style={{fontSize:17,fontWeight:800,marginBottom:11}}>Orações Subordinadas Substantivas</div>
          <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
            {[["intro","Início"],["conteudo","Conteúdo"],["exercicios","Exercícios"],["lab","Laboratório"]].map(([id,label],i)=>(
              <button key={id} onClick={()=>{if(id==="exercicios")iniciarEx();else{setRodando(false);setTela(id);}}} style={{padding:"5px 12px",borderRadius:20,border:"none",cursor:"pointer",fontSize:11,fontWeight:700,background:tela===id||(tela==="resultado"&&id==="exercicios")?"white":"rgba(255,255,255,0.14)",color:tela===id||(tela==="resultado"&&id==="exercicios")?"#1B2A4A":"white"}}>{i+1}. {label}</button>
            ))}
          </div>
        </div>
      </div>

      <div style={{maxWidth:680,margin:"0 auto",padding:"20px 14px"}}>

        {tela==="intro"&&(
          <div className="fade-in">
            <div style={S.card}>
              <div style={{fontSize:26,marginBottom:12}}>✍️</div>
              <p style={{color:"#222",fontSize:15,lineHeight:1.75,margin:"0 0 12px",fontWeight:600}}>Você já usou orações subordinadas hoje — e provavelmente não percebeu.</p>
              <p style={{color:"#555",fontSize:14,lineHeight:1.7,margin:"0 0 10px"}}>Toda vez que um apresentador diz <em>"O governo confirmou que as medidas serão mantidas"</em>, ou você escreve <em>"Espero que dê certo"</em>, está usando essa estrutura.</p>
              <p style={{color:"#555",fontSize:14,lineHeight:1.7,margin:0}}>Dominar isso é escrever e falar com mais precisão — em redações, entrevistas, apresentações.</p>
            </div>
            <div style={S.card}>
              <div style={{fontWeight:700,color:"#1B2A4A",fontSize:13,marginBottom:12}}>O que você vai fazer:</div>
              {[["📖","Aprender as 6 classificações com exemplos reais"],["✏️","Praticar com 6 exercícios rápidos"],["🔬","Analisar uma frase que você mesmo vai criar"]].map(([icon,txt])=>(
                <div key={txt} style={{display:"flex",alignItems:"center",gap:10,marginBottom:8}}>
                  <span style={{fontSize:18}}>{icon}</span>
                  <span style={{color:"#444",fontSize:14}}>{txt}</span>
                </div>
              ))}
            </div>
            <button onClick={()=>setTela("conteudo")} style={{width:"100%",padding:14,background:"#1B2A4A",color:"white",border:"none",borderRadius:12,fontSize:15,fontWeight:700,cursor:"pointer"}}>Começar →</button>
          </div>
        )}

        {tela==="conteudo"&&(
          <div className="fade-in">
            <div style={{display:"flex",gap:5,flexWrap:"wrap",marginBottom:14}}>
              {tipos.map((t,i)=>(
                <button key={t.id} onClick={()=>{setTipoIdx(i);setDica(false);}} style={{padding:"5px 12px",borderRadius:20,border:"2px solid "+(tipoIdx===i?t.cor:"#DDD"),background:tipoIdx===i?t.cor:"white",color:tipoIdx===i?"white":"#555",cursor:"pointer",fontSize:12,fontWeight:600}}>{t.nome}</button>
              ))}
            </div>
            <div style={{background:"white",borderRadius:16,overflow:"hidden",boxShadow:"0 2px 12px rgba(0,0,0,0.06)",marginBottom:14}}>
              <div style={{background:tipo.cor,padding:"16px 22px"}}>
                <div style={{fontSize:9,color:"rgba(255,255,255,0.65)",letterSpacing:2,textTransform:"uppercase"}}>Oração Subordinada Substantiva</div>
                <div style={{fontSize:20,fontWeight:800,color:"white",marginTop:3}}>{tipo.nome}</div>
              </div>
              <div style={{padding:22}}>
                <p style={{color:"#333",lineHeight:1.7,margin:"0 0 18px",fontSize:14}}>{tipo.funcao}</p>
                <div style={{background:tipo.corClara,borderRadius:10,padding:16,marginBottom:14}}>
                  <div style={{fontSize:10,fontWeight:700,color:tipo.cor,textTransform:"uppercase",letterSpacing:1,marginBottom:8}}>Exemplo</div>
                  <p style={{margin:"0 0 12px",fontSize:14,color:"#222",lineHeight:1.6,fontStyle:"italic"}}>
                    <DestaqueFrase frase={tipo.exemplo.frase} destaque={tipo.exemplo.subordinada} cor={tipo.cor}/>
                  </p>
                  <div style={{display:"flex",gap:7,flexWrap:"wrap"}}>
                    <span style={{background:"white",border:"1px solid "+tipo.cor,borderRadius:7,padding:"4px 10px",fontSize:11,color:"#444"}}><strong style={{color:tipo.cor}}>Principal:</strong> {tipo.exemplo.principal}</span>
                    <span style={{background:"white",border:"1px solid "+tipo.cor,borderRadius:7,padding:"4px 10px",fontSize:11,color:"#444"}}><strong style={{color:tipo.cor}}>Função:</strong> {tipo.exemplo.funcao}</span>
                  </div>
                </div>
                <button onClick={()=>setDica(!dica)} style={{background:"none",border:"1px dashed "+tipo.cor,borderRadius:8,padding:"7px 14px",cursor:"pointer",color:tipo.cor,fontWeight:600,fontSize:12,width:"100%",textAlign:"left"}}>
                  {dica?"▲ Ocultar dica":"▼ Como identificar"}
                </button>
                {dica&&<div style={{background:tipo.corClara,border:"1px solid "+tipo.cor,borderRadius:8,padding:12,marginTop:6,fontSize:13,color:"#333",lineHeight:1.6}}>{tipo.dica}</div>}
              </div>
            </div>
            <div style={{display:"flex",gap:8}}>
              <button onClick={()=>{setTipoIdx(t=>Math.max(0,t-1));setDica(false);}} disabled={tipoIdx===0} style={{flex:1,padding:11,borderRadius:10,border:"1px solid #DDD",background:"white",cursor:tipoIdx===0?"not-allowed":"pointer",color:tipoIdx===0?"#BBB":"#333",fontWeight:600,fontSize:13}}>← Anterior</button>
              {tipoIdx<tipos.length-1
                ?<button onClick={()=>{setTipoIdx(t=>t+1);setDica(false);}} style={{flex:1,padding:11,borderRadius:10,border:"none",background:tipo.cor,color:"white",cursor:"pointer",fontWeight:700,fontSize:13}}>Próximo →</button>
                :<button onClick={iniciarEx} style={{flex:1,padding:11,borderRadius:10,border:"none",background:"#1B2A4A",color:"white",cursor:"pointer",fontWeight:700,fontSize:13}}>Ir para exercícios →</button>
              }
            </div>
          </div>
        )}

        {tela==="exercicios"&&(
          <div className="fade-in">
            <div style={{marginBottom:14}}>
              <div style={{display:"flex",justifyContent:"space-between",fontSize:12,color:"#666",marginBottom:5}}>
                <span>Questão {qIdx+1} de {questoes.length}</span>
                <span>⏱ {fmtTime(tempo)}</span>
              </div>
              <div style={{background:"#E0E0E0",borderRadius:10,height:6}}>
                <div style={{background:"#1B2A4A",height:6,borderRadius:10,width:((qIdx/questoes.length)*100)+"%",transition:"width 0.3s"}}/>
              </div>
            </div>
            <div style={S.card}>
              <p style={{color:"#444",fontSize:13,margin:"0 0 6px"}}>Identifique a oração subordinada em destaque:</p>
              <div style={{background:"#F5F6FA",borderRadius:8,padding:"12px 14px",fontSize:14,color:"#222",lineHeight:1.7,marginBottom:18,fontStyle:"italic"}}>
                <DestaqueFrase frase={questao.frase} destaque={questao.destaque} cor="#1B2A4A"/>
              </div>
              <div style={{display:"flex",flexDirection:"column",gap:7}}>
                {tipos.map(t=>{
                  const sel=opcao===t.id,correta=t.id===questao.resposta;
                  let bg="white",border="1px solid #DDD",cor="#333";
                  if(confirmada){if(correta){bg="#E8F8F0";border="2px solid #27AE60";cor="#1A7A45";}else if(sel){bg="#FDECEA";border="2px solid #C0392B";cor="#8B1A1A";}}
                  else if(sel){bg=t.corClara;border="2px solid "+t.cor;cor=t.cor;}
                  return(
                    <button key={t.id} onClick={()=>!confirmada&&setOpcao(t.id)} style={{background:bg,border,borderRadius:8,padding:"10px 14px",textAlign:"left",cursor:confirmada?"default":"pointer",color:cor,fontWeight:sel||(confirmada&&correta)?700:400,fontSize:13,display:"flex",alignItems:"center",gap:9}}>
                      <div style={{width:17,height:17,borderRadius:"50%",border:"2px solid "+(confirmada&&correta?"#27AE60":sel?t.cor:"#CCC"),background:sel?(confirmada?(correta?"#27AE60":"#C0392B"):t.cor):"white",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center"}}>
                        {sel&&<div style={{width:6,height:6,borderRadius:"50%",background:"white"}}/>}
                      </div>
                      {t.nome}
                      {confirmada&&correta&&<span style={{marginLeft:"auto"}}>✓</span>}
                      {confirmada&&sel&&!correta&&<span style={{marginLeft:"auto"}}>✗</span>}
                    </button>
                  );
                })}
              </div>
            </div>
            {confirmada&&(
              <div style={{background:respostas[qIdx]===questao.resposta?"#E8F8F0":"#FDECEA",border:"1px solid "+(respostas[qIdx]===questao.resposta?"#27AE60":"#C0392B"),borderRadius:10,padding:14,marginBottom:14}}>
                <div style={{fontWeight:700,color:respostas[qIdx]===questao.resposta?"#1A7A45":"#8B1A1A",marginBottom:4,fontSize:14}}>
                  {respostas[qIdx]===questao.resposta?"✓ Correto!":"✗ Incorreto — é "+nomeTipo(questao.resposta)}
                </div>
                <p style={{margin:0,color:"#333",fontSize:13,lineHeight:1.6}}>{questao.explicacao}</p>
              </div>
            )}
            {!confirmada
              ?<button onClick={confirmar} disabled={!opcao} style={{width:"100%",padding:13,borderRadius:10,border:"none",background:opcao?"#1B2A4A":"#CCC",color:"white",fontWeight:700,fontSize:14,cursor:opcao?"pointer":"not-allowed"}}>Confirmar</button>
              :<button onClick={proxQuestao} style={{width:"100%",padding:13,borderRadius:10,border:"none",background:"#1B2A4A",color:"white",fontWeight:700,fontSize:14,cursor:"pointer"}}>{qIdx<questoes.length-1?"Próxima →":"Ver resultado →"}</button>
            }
          </div>
        )}

        {tela==="lab"&&(
          <div className="fade-in">
            {labEtapa===0&&(
              <div>
                <div style={S.card}>
                  <div style={{fontSize:22,marginBottom:10}}>🔬</div>
                  <p style={{color:"#222",fontSize:15,fontWeight:600,margin:"0 0 6px"}}>Escreva uma frase sua.</p>
                  <p style={{color:"#666",fontSize:13,lineHeight:1.6,margin:"0 0 18px"}}>Pode ser qualquer coisa do seu dia a dia. O algoritmo vai decompor e analisar.</p>
                  <textarea value={frase} onChange={e=>{setFrase(e.target.value);setLabErro("");}}
                    placeholder="Ex: Eu sei que a tecnologia muda o mundo..." rows={3}
                    style={{width:"100%",padding:"12px 14px",borderRadius:10,border:"1.5px solid #DDD",fontSize:14,color:"#222",resize:"vertical",fontFamily:"inherit",lineHeight:1.6,boxSizing:"border-box"}}/>
                  {labErro&&<p style={{color:"#C0392B",fontSize:13,margin:"6px 0 0"}}>{labErro}</p>}
                </div>
                <button onClick={analisarFrase} style={{width:"100%",padding:14,background:"#1B2A4A",color:"white",border:"none",borderRadius:12,fontSize:15,fontWeight:700,cursor:"pointer"}}>Analisar minha frase →</button>
              </div>
            )}
            {labEtapa===1&&(
              <div style={{...S.card,textAlign:"center",padding:48}}>
                <div style={{fontSize:36,marginBottom:16,display:"inline-block",animation:"spin 1s linear infinite"}}>⚙️</div>
                <p style={{color:"#555",fontSize:14,margin:0}}>Decompondo sua frase…</p>
              </div>
            )}
            {labEtapa===2&&labResult&&(
              <div>
                <div style={{background:"#1B2A4A",borderRadius:14,padding:"16px 20px",marginBottom:12}}>
                  <div style={{fontSize:10,color:"rgba(255,255,255,0.5)",letterSpacing:2,textTransform:"uppercase",marginBottom:6}}>Sua frase</div>
                  <p style={{color:"white",fontSize:14,margin:0,lineHeight:1.6,fontStyle:"italic"}}>"{frase}"</p>
                </div>
                {labResult.temSubordinada&&(
                  <div style={S.card}>
                    <div style={{fontWeight:700,color:"#1B2A4A",fontSize:13,marginBottom:14}}>🔍 Decomposição</div>
                    <div style={{display:"flex",flexDirection:"column",gap:10}}>
                      <div style={{background:"#F5F6FA",borderRadius:8,padding:"10px 14px"}}>
                        <div style={{fontSize:10,color:"#888",textTransform:"uppercase",letterSpacing:1,marginBottom:3}}>Oração Principal</div>
                        <div style={{fontSize:14,color:"#222",fontWeight:600}}>{labResult.oracaoPrincipal||"—"}</div>
                      </div>
                      <div style={{background:corTipo(labResult.tipo)+"18",border:"1px solid "+corTipo(labResult.tipo),borderRadius:8,padding:"10px 14px"}}>
                        <div style={{fontSize:10,color:corTipo(labResult.tipo),textTransform:"uppercase",letterSpacing:1,marginBottom:3,fontWeight:700}}>Subordinada · {nomeTipo(labResult.tipo)}</div>
                        <div style={{fontSize:14,color:"#222",fontWeight:600}}>{labResult.oracaoSubordinada||"—"}</div>
                        {labResult.funcaoSintatica&&<div style={{fontSize:12,color:"#666",marginTop:4}}>Função: {labResult.funcaoSintatica}</div>}
                      </div>
                    </div>
                  </div>
                )}
                <div style={S.card}>
                  <div style={{fontWeight:700,color:"#1B2A4A",fontSize:13,marginBottom:10}}>💬 O que a análise mostra</div>
                  <p style={{color:"#333",fontSize:14,lineHeight:1.7,margin:"0 0 10px"}}>{labResult.avaliacaoBreve}</p>
                  {labResult.sugestao&&<div style={{background:"#EBF4FF",borderRadius:8,padding:"10px 14px",fontSize:13,color:"#1B2A4A",lineHeight:1.6}}>💡 {labResult.sugestao}</div>}
                </div>
                {labResult.exemploReal&&(
                  <div style={S.card}>
                    <div style={{fontWeight:700,color:"#1B2A4A",fontSize:13,marginBottom:10}}>📺 Essa estrutura no mundo real</div>
                    <div style={{background:"#F5F6FA",borderLeft:"4px solid #1B2A4A",borderRadius:"0 8px 8px 0",padding:"12px 16px",marginBottom:8}}>
                      <p style={{color:"#222",fontSize:14,margin:0,fontStyle:"italic",lineHeight:1.6}}>"{labResult.exemploReal}"</p>
                    </div>
                    <div style={{fontSize:12,color:"#888"}}>{{telejornal:"📺 Telejornal",editorial:"📰 Editorial",discurso:"🎤 Discurso formal","notícia":"📄 Notícia","anúncio":"📣 Anúncio"}[labResult.genero]||"Gênero formal"}</div>
                  </div>
                )}
                <div style={{display:"flex",gap:9,marginBottom:9}}>
                  <button onClick={()=>{setFrase("");setLabEtapa(0);setLabResult(null);}} style={{flex:1,padding:12,borderRadius:10,border:"1px solid #1B2A4A",background:"white",color:"#1B2A4A",fontWeight:700,fontSize:13,cursor:"pointer"}}>Analisar outra frase</button>
                  <button onClick={iniciarEx} style={{flex:1,padding:12,borderRadius:10,border:"none",background:"#1B2A4A",color:"white",fontWeight:700,fontSize:13,cursor:"pointer"}}>Ir para exercícios</button>
                </div>
              </div>
            )}
          </div>
        )}

        {tela==="resultado"&&(
          <div className="fade-in">
            <div style={{...S.card,textAlign:"center"}}>
              <div style={{fontSize:42,marginBottom:8}}>{msg.e}</div>
              <h2 style={{color:"#1B2A4A",margin:"0 0 6px",fontSize:20}}>Você acertou {acertosFinais} de {questoes.length}</h2>
              <p style={{color:"#555",margin:"0 0 16px",fontSize:14}}>{msg.t}</p>
              <div style={{display:"flex",gap:12,justifyContent:"center",marginBottom:16}}>
                <div style={{background:"#F5F6FA",borderRadius:10,padding:"10px 18px"}}>
                  <div style={{fontSize:26,fontWeight:800,color:"#1B2A4A"}}>{Math.round(acertosFinais/questoes.length*100)}%</div>
                  <div style={{color:"#888",fontSize:11}}>aproveitamento</div>
                </div>
                <div style={{background:"#F5F6FA",borderRadius:10,padding:"10px 18px"}}>
                  <div style={{fontSize:20,fontWeight:800,color:"#1B2A4A"}}>{fmtTime(tempo)}</div>
                  <div style={{color:"#888",fontSize:11}}>tempo</div>
                </div>
              </div>
              <div style={{background:"#F5F6FA",borderRadius:10,padding:14,textAlign:"left",marginBottom:8}}>
                <div style={{fontWeight:700,color:"#1B2A4A",marginBottom:10,fontSize:13}}>Gabarito:</div>
                {questoes.map((q,i)=>{
                  const ac=respostas[i]===q.resposta;
                  return(<div key={i} style={{display:"flex",alignItems:"center",gap:8,padding:"6px 0",borderBottom:i<questoes.length-1?"1px solid #E8E8E8":"none"}}>
                    <span style={{width:20,height:20,borderRadius:"50%",background:ac?"#27AE60":"#C0392B",color:"white",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,flexShrink:0}}>{ac?"✓":"✗"}</span>
                    <span style={{fontSize:12,color:"#333"}}>Q{i+1}: <strong style={{color:corTipo(q.resposta)}}>{nomeTipo(q.resposta)}</strong>{!ac&&respostas[i]&&<span style={{color:"#999"}}> (você: {nomeTipo(respostas[i])})</span>}</span>
                  </div>);
                })}
              </div>
              <Grafico/>
            </div>
            <div style={{display:"flex",gap:9,marginBottom:9}}>
              <button onClick={()=>setTela("conteudo")} style={{flex:1,padding:12,borderRadius:10,border:"1px solid #1B2A4A",background:"white",color:"#1B2A4A",fontWeight:700,fontSize:13,cursor:"pointer"}}>Rever conteúdo</button>
              <button onClick={iniciarEx} style={{flex:1,padding:12,borderRadius:10,border:"none",background:"#1B2A4A",color:"white",fontWeight:700,fontSize:13,cursor:"pointer"}}>Tentar novamente</button>
            </div>
            <button onClick={()=>{setTela("lab");setLabEtapa(0);setLabResult(null);setFrase("");}} style={{width:"100%",padding:12,borderRadius:10,border:"none",background:"#2A9D8F",color:"white",fontWeight:700,fontSize:13,cursor:"pointer"}}>
              🔬 Ir para o Laboratório
            </button>
          </div>
        )}
      </div>
    </div>
  );
}

// ── ROOT ──────────────────────────────────────────────────────────────
function App(){
  const [session,setSession] = useState(null);
  const [perfil,setPerfil]   = useState(null);
  const [loading,setLoading] = useState(true);

  useEffect(()=>{
    sb.auth.getSession().then(({data:{session}})=>{
      setSession(session);
      if(session) carregarPerfil(session.user);
      else setLoading(false);
    });
    const {data:{subscription}} = sb.auth.onAuthStateChange((_,session)=>{
      setSession(session);
      if(session) carregarPerfil(session.user);
      else{ setPerfil(null);setLoading(false); }
    });
    return ()=>subscription.unsubscribe();
  },[]);

  async function carregarPerfil(user){
    setLoading(true);
    const {data} = await sb.from("perfis").select("*").eq("id",user.id).single();
    setPerfil(data);
    setLoading(false);
  }

  async function sair(){
    await sb.auth.signOut();
    setSession(null);setPerfil(null);
  }

  if(loading) return React.createElement(Loading);
  if(!session) return React.createElement(TelaLogin);
  if(session.user.email===PROFESSOR_EMAIL) return React.createElement(PainelProfessor,{onSair:sair});
  return React.createElement(ODA,{user:session.user,perfil,onSair:sair});
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
